name: Update Finance News

on:
  schedule:
    - cron: '0 7,13,19 * * *'   # Runs at 7am, 1pm, 7pm UTC (3am, 9am, 3pm ET)
  workflow_dispatch:              # Allows manual trigger from GitHub website

permissions:
  contents: write   # needed to commit summaries.json back to repo
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser

      - name: Generate news pages
        run: python finance_news.py

      - name: Commit updated weekly summaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/summaries.json
          git diff --staged --quiet || git commit -m "chore: update weekly summaries [skip ci]"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './output'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
